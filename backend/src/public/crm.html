<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILO CRM - Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: var(--card-bg);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .sidebar h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 0.8rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .nav-item:hover { background-color: rgba(59, 130, 246, 0.1); color: var(--text-primary); }
        .nav-item.active { background-color: var(--accent); color: white; }

        .main-content { flex: 1; padding: 2.5rem; overflow-y: auto; }
        .section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 1.8rem; margin-bottom: 2rem; }

        /* Feature: Selección de Barbero */
        .config-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
        }

        .config-info h3 { margin: 0; font-size: 1rem; }
        .config-info p { margin: 0.4rem 0 0; font-size: 0.85rem; color: var(--text-secondary); }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>FILO CRM</h2>
        <div class="nav-item active" onclick="showSection('dashboard', this)">Dashboard</div>
        <div class="nav-item" onclick="showSection('clientes', this)">Clientes</div>
        <div class="nav-item" onclick="showSection('configuracion', this)">Configuración</div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="section active">
            <h1>Panel Principal</h1>
            <p>Estado del sistema: <span style="color: var(--success, #10b981)">Online</span></p>
        </div>

        <div id="clientes" class="section">
            <h1>Base de Clientes</h1>
            <p>Cargando datos...</p>
        </div>

        <div id="configuracion" class="section">
            <h1>Configuración</h1>
            <div class="config-card">
                <div class="config-info">
                    <h3>Selección de Barbero</h3>
                    <p>Permite que el cliente elija un profesional específico al reservar.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="barberoToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script>
        function showSection(sectionId, element) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            element.classList.add('active');
        }

        const barberoToggle = document.getElementById('barberoToggle');

        // Persistencia
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('filo_barbero') === 'true') {
                barberoToggle.checked = true;
            }
        });

        barberoToggle.addEventListener('change', (e) => {
            localStorage.setItem('filo_barbero', e.target.checked);
        });
    </script>
</body>
</html>
